<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz de Eliminação</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  margin: 0;
  color: #222;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

h1, h2 {
  margin-top: 0;
}

select, input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 15px;
}

.primary {
  background: #2563eb;
  color: white;
}

.secondary {
  background: #e2e8f0;
}

.answer {
  background: #edf2f7;
}

.correct {
  background: #22c55e;
  color: white;
}

.wrong {
  background: #ef4444;
  color: white;
}

.chip {
  display: inline-block;
  padding: 6px 10px;
  margin: 5px;
  background: #e2e8f0;
  border-radius: 20px;
}

.hidden {
  display: none;
}

.small {
  font-size: 14px;
  color: #555;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
  <h1>🎯 Quiz</h1>

  <select id="tema">
    <option>História</option>
    <option>Segunda Guerra</option>
    <option>Geopolítica</option>
    <option>Filosofia</option>
    <option>Direito</option>
    <option>Economia</option>
    <option>Saúde</option>
    <option>Psicologia</option>
    <option>Biologia</option>
    <option>Tecnologia</option>
    <option>Capitais</option>
    <option>Frases famosas</option>
  </select>
</div>

<div class="card">
  <h2>Jogadores</h2>

  <input id="playerInput" placeholder="Nome do jogador">
  <button class="secondary" onclick="addPlayer()">Adicionar</button>

  <div id="players"></div>
</div>

<div class="card">
  <button class="primary" onclick="generateQuestion()">Gerar pergunta</button>
</div>

<div class="card hidden" id="quizCard">
  <h2 id="question"></h2>

  <div id="answers"></div>

  <button class="secondary" onclick="showAnswer()">Mostrar resposta</button>

  <p class="small" id="explanation"></p>
</div>

<div class="card hidden" id="elimCard">
  <h2>Quem errou?</h2>
  <div id="elimList"></div>
  <button class="primary" onclick="eliminate()">Eliminar</button>
</div>

<div class="card hidden" id="winnerCard">
  <h1 id="winner"></h1>
  <button class="primary" onclick="location.reload()">Novo jogo</button>
</div>

</div>

<script>
let players = [];
let correctIndex = 0;
let explanationText = "";

function addPlayer() {
  let name = document.getElementById("playerInput").value.trim();
  if (!name) return;
  players.push(name);
  document.getElementById("playerInput").value = "";
  renderPlayers();
}

function renderPlayers() {
  document.getElementById("players").innerHTML =
    players.map(p => `<span class="chip">${p}</span>`).join("");
}

async function generateQuestion() {
  const tema = document.getElementById("tema").value;

  const res = await fetch("/api/generate-question", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ tema })
  });

  const data = await res.json();

  document.getElementById("quizCard").classList.remove("hidden");
  document.getElementById("elimCard").classList.remove("hidden");

  document.getElementById("question").innerText = data.question;
  explanationText = data.explanation;

  correctIndex = data.correct;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  data.options.forEach((opt, i) => {
    let btn = document.createElement("button");
    btn.className = "answer";
    btn.innerText = opt;
    btn.onclick = () => selectAnswer(btn, i);
    answersDiv.appendChild(btn);
  });

  renderElimination();
}

function selectAnswer(btn, i) {
  document.querySelectorAll(".answer").forEach(b => b.disabled = true);

  if (i === correctIndex) {
    btn.classList.add("correct");
  } else {
    btn.classList.add("wrong");
  }
}

function showAnswer() {
  document.querySelectorAll(".answer")[correctIndex].classList.add("correct");
  document.getElementById("explanation").innerText = explanationText;
}

function renderElimination() {
  document.getElementById("elimList").innerHTML =
    players.map(p => `
      <label>
        <input type="checkbox" value="${p}"> ${p}
      </label><br>
    `).join("");
}

function eliminate() {
  let selected = [...document.querySelectorAll("#elimList input:checked")]
    .map(x => x.value);

  players = players.filter(p => !selected.includes(p));

  if (players.length === 1) {
    document.getElementById("winnerCard").classList.remove("hidden");
    document.getElementById("winner").innerText = "🏆 " + players[0];
    return;
  }

  generateQuestion();
}
</script>

</body>
</html>
